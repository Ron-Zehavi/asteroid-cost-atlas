name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 975050282139.dkr.ecr.us-east-1.amazonaws.com/asteroid-cost-atlas
  ECR_REPO_NAME: asteroid-cost-atlas
  DATA_BUCKET: asteroid-cost-atlas-data-975050282139
  ROLE_ARN: arn:aws:iam::975050282139:role/asteroid-cost-atlas-github-actions

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Download processed data from S3
        run: |
          mkdir -p data/processed
          aws s3 sync "s3://${DATA_BUCKET}/processed/" data/processed/ --exact-timestamps
          ls -lh data/processed/

      - id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.ECR_REPOSITORY }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger dev App Runner deployment
        run: |
          ARN=$(aws apprunner list-services --region $AWS_REGION \
            --query "ServiceSummaryList[?ServiceName=='asteroid-cost-atlas-dev'].ServiceArn | [0]" \
            --output text)
          if [ -z "$ARN" ] || [ "$ARN" = "None" ]; then
            echo "Dev App Runner service not found — create it via terraform first"
            exit 1
          fi
          aws apprunner start-deployment --service-arn "$ARN" --region $AWS_REGION

  deploy-prod:
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Promote sha tag to :prod
        run: |
          MANIFEST=$(aws ecr batch-get-image --repository-name "$ECR_REPO_NAME" \
            --image-ids imageTag=${{ needs.build.outputs.sha_tag }} \
            --region $AWS_REGION \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --repository-name "$ECR_REPO_NAME" \
            --image-tag prod \
            --image-manifest "$MANIFEST" \
            --region $AWS_REGION || \
          aws ecr put-image --repository-name "$ECR_REPO_NAME" \
            --image-tag prod \
            --image-manifest "$MANIFEST" \
            --region $AWS_REGION 2>&1 | grep -q ImageAlreadyExistsException && echo "tag already up to date"

      - name: Trigger prod App Runner deployment
        run: |
          ARN=$(aws apprunner list-services --region $AWS_REGION \
            --query "ServiceSummaryList[?ServiceName=='asteroid-cost-atlas-prod'].ServiceArn | [0]" \
            --output text)
          if [ -z "$ARN" ] || [ "$ARN" = "None" ]; then
            echo "Prod App Runner service not found — create it via terraform first"
            exit 1
          fi
          aws apprunner start-deployment --service-arn "$ARN" --region $AWS_REGION
