name: Build and deploy to App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 975050282139.dkr.ecr.us-east-1.amazonaws.com/asteroid-cost-atlas
  DATA_BUCKET: asteroid-cost-atlas-data-975050282139

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::975050282139:role/asteroid-cost-atlas-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Download processed data from S3
        run: |
          mkdir -p data/processed
          aws s3 sync "s3://${DATA_BUCKET}/processed/" data/processed/ --exact-timestamps
          ls -lh data/processed/

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger App Runner deployment
        run: |
          ARN=$(aws apprunner list-services --region $AWS_REGION \
            --query "ServiceSummaryList[?ServiceName=='asteroid-cost-atlas'].ServiceArn | [0]" \
            --output text)
          if [ -z "$ARN" ] || [ "$ARN" = "None" ]; then
            echo "App Runner service not found — create it via terraform first"
            exit 1
          fi
          aws apprunner start-deployment --service-arn "$ARN" --region $AWS_REGION
